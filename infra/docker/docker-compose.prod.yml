name: lumina-research-prod

services:
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  api:
    build:
      context: ../..
      dockerfile: infra/docker/api.Dockerfile
      extra_hosts:
        - "files.pythonhosted.org:167.82.56.223"
    restart: unless-stopped
    env_file:
      - ../../services/api/.env
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "8000:8000"
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000
    environment:
      API_HOST: 0.0.0.0
      API_PORT: 8000
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      SUPABASE_URL:
      SUPABASE_SERVICE_ROLE_KEY:
      SUPABASE_JWT_SECRET:
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-sources}
    healthcheck:
      test:
        [
          "CMD",
          "python",
          "-c",
          "import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/health')",
        ]
      interval: 15s
      timeout: 5s
      retries: 5

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/worker.Dockerfile
      extra_hosts:
        - "files.pythonhosted.org:167.82.56.223"
    restart: unless-stopped
    env_file:
      - ../../services/worker/.env
    depends_on:
      redis:
        condition: service_healthy
    command: python main.py
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      SUPABASE_URL:
      SUPABASE_SERVICE_ROLE_KEY:
      SUPABASE_STORAGE_BUCKET: ${SUPABASE_STORAGE_BUCKET:-sources}
      GOOGLE_API_KEY:
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-models/gemini-embedding-001}
      GEMINI_EMBEDDING_DIMENSIONS: ${GEMINI_EMBEDDING_DIMENSIONS:-1536}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY:
      LANGSMITH_PROJECT: ${WORKER_LANGSMITH_PROJECT:-lumina-research-worker}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}

  orchestrator:
    build:
      context: ../..
      dockerfile: infra/docker/orchestrator.Dockerfile
      extra_hosts:
        - "files.pythonhosted.org:167.82.56.223"
    restart: unless-stopped
    env_file:
      - ../../services/orchestrator/.env
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A orchestrator.core.celery_app.celery_app worker --loglevel=INFO --queues=orchestrator
    environment:
      CELERY_BROKER_URL: ${CELERY_BROKER_URL:-redis://redis:6379/0}
      CELERY_RESULT_BACKEND: ${CELERY_RESULT_BACKEND:-redis://redis:6379/1}
      SUPABASE_URL:
      SUPABASE_SERVICE_ROLE_KEY:
      DATABASE_URL:
      LANGGRAPH_CHECKPOINT_DB_URL:
      AI_SETTINGS_ENCRYPTION_KEY:
      OLLAMA_BASE_URL: ${OLLAMA_BASE_URL:-http://host.docker.internal:11434}
      GOOGLE_API_KEY:
      GEMINI_PLANNER_MODEL: ${GEMINI_PLANNER_MODEL:-gemini-2.5-flash-lite}
      GEMINI_ANALYZER_MODEL: ${GEMINI_ANALYZER_MODEL:-gemini-2.5-flash-lite}
      GEMINI_WRITER_MODEL: ${GEMINI_WRITER_MODEL:-gemini-2.5-flash-lite}
      GEMINI_EMBEDDING_MODEL: ${GEMINI_EMBEDDING_MODEL:-models/gemini-embedding-001}
      GEMINI_EMBEDDING_DIMENSIONS: ${GEMINI_EMBEDDING_DIMENSIONS:-1536}
      LANGSMITH_TRACING: ${LANGSMITH_TRACING:-false}
      LANGSMITH_API_KEY:
      LANGSMITH_PROJECT: ${ORCHESTRATOR_LANGSMITH_PROJECT:-lumina-research-orchestrator}
      LANGSMITH_ENDPOINT: ${LANGSMITH_ENDPOINT:-https://api.smith.langchain.com}
    extra_hosts:
      - "host.docker.internal:host-gateway"
