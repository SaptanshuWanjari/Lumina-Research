session: dev

windows:
  - name: website
    split: vertical
    panes:
      - cwd: ./apps/website
        cmd: npm run dev

  - name: python
    layout: tiled

    panes:
      - cwd: ./
        cmd: redis-server

      - cwd: ./services/worker
        cmd: uv run python main.py

      - cwd: ./services/api
        cmd: uv run python main.py

      - cwd: ./services/orchestrator
        cmd: >
          uv run celery
          -A orchestrator.core.celery_app.celery_app
          worker
          --loglevel=INFO
          --queues=orchestrator
