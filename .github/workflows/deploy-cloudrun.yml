name: Deploy to Google Cloud Run

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'infra/docker/**'
      - '.github/workflows/deploy-cloudrun.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
              - 'infra/docker/api.Dockerfile'
            worker:
              - 'services/worker/**'
              - 'infra/docker/worker.Dockerfile'
            orchestrator:
              - 'services/orchestrator/**'
              - 'infra/docker/orchestrator.Dockerfile'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Build and push API image
        if: steps.filter.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          docker build \
            -f infra/docker/api.Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/api:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/api:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/api:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/api:latest

      - name: Deploy API to Cloud Run
        if: steps.filter.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          gcloud run deploy lumina-api \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/api:latest \
            --platform managed \
            --region ${{ env.REGION }} \
            --memory 512Mi \
            --cpu 1 \
            --timeout 3600 \
            --max-instances 100 \
            --concurrency 80 \
            --allow-unauthenticated

      - name: Build and push Worker image
        if: steps.filter.outputs.worker == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          docker build \
            -f infra/docker/worker.Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/worker:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/worker:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/worker:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/worker:latest

      - name: Deploy Worker to Cloud Run
        if: steps.filter.outputs.worker == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          gcloud run deploy lumina-worker \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/worker:latest \
            --platform managed \
            --region ${{ env.REGION }} \
            --memory 1024Mi \
            --cpu 2 \
            --timeout 3600 \
            --max-instances 50 \
            --no-allow-unauthenticated

      - name: Build and push Orchestrator image
        if: steps.filter.outputs.orchestrator == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          docker build \
            -f infra/docker/orchestrator.Dockerfile \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/orchestrator:${{ github.sha }} \
            -t ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/orchestrator:latest \
            .
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/orchestrator:${{ github.sha }}
          docker push ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/orchestrator:latest

      - name: Deploy Orchestrator to Cloud Run
        if: steps.filter.outputs.orchestrator == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          gcloud run deploy lumina-orchestrator \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/orchestrator:latest \
            --platform managed \
            --region ${{ env.REGION }} \
            --memory 1024Mi \
            --cpu 2 \
            --timeout 3600 \
            --max-instances 20 \
            --no-allow-unauthenticated

      - name: Print deployment info
        run: |
          echo "✅ Deployed successfully!"
          echo "API: $(gcloud run services describe lumina-api --region=${{ env.REGION }} --format='value(status.url)')"
          echo "Worker: $(gcloud run services describe lumina-worker --region=${{ env.REGION }} --format='value(status.url)')"
          echo "Orchestrator: $(gcloud run services describe lumina-orchestrator --region=${{ env.REGION }} --format='value(status.url)')"
