name: Deploy to Google Cloud Run

on:
  push:
    branches: [main, develop]
    paths:
      - 'services/**'
      - 'infra/docker/**'
      - '.github/workflows/deploy-cloudrun.yml'
  workflow_dispatch:

env:
  PROJECT_ID: ${{ secrets.GCP_PROJECT_ID }}
  REGION: us-central1
  REGISTRY: us-central1-docker.pkg.dev

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      actions: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Check for file changes
        uses: dorny/paths-filter@v3
        id: filter
        with:
          filters: |
            api:
              - 'services/api/**'
              - 'infra/docker/api.Dockerfile'
            worker:
              - 'services/worker/**'
              - 'infra/docker/worker.Dockerfile'
            orchestrator:
              - 'services/orchestrator/**'
              - 'infra/docker/orchestrator.Dockerfile'

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: ${{ secrets.GCP_CREDENTIALS }}

      - name: Setup Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker ${{ env.REGISTRY }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and push API image
        if: steps.filter.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/api.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/api:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/api:latest
          cache-from: type=gha,scope=${{ github.ref_name }}-api
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-api

      - name: Deploy API to Cloud Run
        if: steps.filter.outputs.api == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          gcloud run deploy lumina-api \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/api:latest \
            --platform managed \
            --region ${{ env.REGION }} \
            --memory 512Mi \
            --cpu 1 \
            --timeout 3600 \
            --max-instances 100 \
            --concurrency 80 \
            --allow-unauthenticated

      - name: Build and push Worker image
        if: steps.filter.outputs.worker == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/worker.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/worker:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/worker:latest
          cache-from: type=gha,scope=${{ github.ref_name }}-worker
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-worker

      - name: Deploy Worker to Cloud Run
        if: steps.filter.outputs.worker == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          gcloud run deploy lumina-worker \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/worker:latest \
            --platform managed \
            --region ${{ env.REGION }} \
            --memory 1024Mi \
            --cpu 2 \
            --timeout 3600 \
            --max-instances 50 \
            --no-allow-unauthenticated

      - name: Build and push Orchestrator image
        if: steps.filter.outputs.orchestrator == 'true' || github.event_name == 'workflow_dispatch'
        uses: docker/build-push-action@v5
        with:
          context: .
          file: infra/docker/orchestrator.Dockerfile
          push: true
          tags: |
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/orchestrator:${{ github.sha }}
            ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/orchestrator:latest
          cache-from: type=gha,scope=${{ github.ref_name }}-orchestrator
          cache-to: type=gha,mode=max,scope=${{ github.ref_name }}-orchestrator

      - name: Deploy Orchestrator to Cloud Run
        if: steps.filter.outputs.orchestrator == 'true' || github.event_name == 'workflow_dispatch'
        run: |
          gcloud run deploy lumina-orchestrator \
            --image ${{ env.REGISTRY }}/${{ env.PROJECT_ID }}/lumina-docker/orchestrator:latest \
            --platform managed \
            --region ${{ env.REGION }} \
            --memory 1024Mi \
            --cpu 2 \
            --timeout 3600 \
            --max-instances 20 \
            --no-allow-unauthenticated

      - name: Print deployment info
        run: |
          echo "✅ Deployed successfully!"
          echo "API: $(gcloud run services describe lumina-api --region=${{ env.REGION }} --format='value(status.url)')"
          echo "Worker: $(gcloud run services describe lumina-worker --region=${{ env.REGION }} --format='value(status.url)')"
          echo "Orchestrator: $(gcloud run services describe lumina-orchestrator --region=${{ env.REGION }} --format='value(status.url)')"

      - name: Cleanup old caches
        if: always()
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          echo "Cleaning up old caches..."
          
          for scope in api worker orchestrator; do
            # Get cache keys containing the scope name, sorted by creation date (newest first)
            keys=$(gh cache list -R $GITHUB_REPOSITORY --ref ${{ github.ref }} --json key,createdAt -q 'sort_by(.createdAt) | reverse | .[].key' | grep "$scope" || true)
            
            count=0
            for key in $keys; do
              count=$((count+1))
              if [ $count -gt 2 ]; then
                echo "Deleting cache: $key"
                gh cache delete "$key" -R $GITHUB_REPOSITORY || true
              fi
            done
          done
